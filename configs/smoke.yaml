seed: 2026
device: cuda

data:
  genome_dir: data/dna
  cpg_table: data/cpgIslandExt.tsv
  train_chroms: ["chr21"]
  val_chroms: ["chr22"]
  test_chroms: ["chr22"]
  window_size: 512
  stride: 128
  max_train_windows: 1024
  max_val_windows: 512
  max_test_windows: 1000
  positive_fraction: 0.50
  hard_negative_fraction: 0.25
  min_gc_for_hard_negative: 0.50
  boundary_fl: 2000

model:
  channels: [16, 32, 64]
  kernels: [7, 5, 3]
  dilations: [1, 2, 4]
  dropout: 0.05

training:
  epochs: 1
  batch_size: 64
  lr: 0.001
  weight_decay: 0.01
  lambda_window: 0.25
  lambda_dice: 0.20
  base_pos_weight: null
  estimate_pos_weight_batches: 256
  amp: true
  pin_memory: true
  early_stopping_patience: 5
  num_workers: 0
  threshold_grid: [0.20, 0.30, 0.40, 0.50, .60, 0.70, 0.80]

prediction:
  batch_size: 1024
  write_bedgraph: false

postprocess:
  min_length: 200
  max_gap: 100
  use_window_filter: false
  window_threshold: 0.10

output:
  run_dir: runs/smoke
