seed: 2026
device: cuda

data:
  genome_dir: data/dna
  cpg_table: data/cpgIslandExt.tsv
  train_chroms: ["chr1", "chr2", "chr3", "chr4", "chr5", "chr6", "chr7", "chr8", "chr9", "chr10", "chr11", "chr12", "chr13", "chr14", "chr15", "chr16"]
  val_chroms: ["chr17", "chr18"]
  test_chroms: ["chr19", "chr20", "chr21", "chr22"]
  window_size: 512
  stride: 128
  max_train_windows: 1000000
  max_val_windows: 100000
  max_test_windows: 50000
  positive_fraction: 0.45
  hard_negative_fraction: 0.25
  min_gc_for_hard_negative: .50
  boundary_fl: 2000

model:
  channels: [64, 128, 256, 512]
  kernels: [9, 7, 5, 3]
  dilations: [1, 1, 1, 1]
  dropout: 0.10
  window_hidden_channels: 256

training:
  epochs: 100
  batch_size: 4096
  compile: True
  lr: 0.0005
  min_lr: 0.00002
  scheduler: reduce_on_plateau
  warmup_epochs: 3
  plateau_factor: 0.5
  plateau_patience: 3
  weight_decay: 0.01
  mtl_method: gradnorm
  lambda_window: 0.40
  lambda_dice: 0.20
  lambda_consistency: 0.10
  gradnorm_alpha: 1.5
  gradnorm_lambda: 1.0
  base_pos_weight: null
  estimate_pos_weight_batches: 2048
  amp: true
  pin_memory: true
  early_stopping_patience: 10
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  metric_bins: 2048
  monitor:
    base_metric: val_base_best_f1
    window_metric: val_window_pr_auc
    base_weight: 0.70
    window_weight: 0.30
  threshold_grid: [0.20, 0.25, 0.30, .35, .40, 0.45, 0.60, 0.70, 0.80]

dnabert2_baseline:
  enabled: false
  model_name: zhihan1996/DNABERT-2-117M
  model_path: DNABERT2_models
  low_cpu_mem_usage: false
  device_map: null
  torch_dtype: null
  load_strategy: auto
  use_triton_flash_attention: true
  output_dir: runs/default/dnabert2_baseline
  model_max_length: 512
  pad_to_max_length: true
  label_fraction_threshold: 0.0
  epochs: 3
  max_steps: -1
  batch_size: 256
  eval_batch_size: 512
  eval_accumulation_steps: 16
  torch_empty_cache_steps: null
  gradient_accumulation_steps: 1
  lr: 0.00003
  lr_scheduler_type: linear
  weight_decay: 0.01
  warmup_steps: 50
  warmup_ratio: null
  max_grad_norm: 1.0
  eval_strategy: epoch
  save_strategy: epoch
  logging_strategy: steps
  save_total_limit: 3
  logging_steps: 100
  load_best_model_at_end: true
  eval_on_start: false
  early_stopping_patience: 3
  metric_for_best_model: f1
  fp16: true
  pin_memory: true
  num_workers: 4
  report_to: none
  max_train_windows: null
  max_val_windows: null
  max_test_windows: null

prediction:
  batch_size: 2048
  write_bedgraph: false

postprocess:
  min_length: 2000
  max_gap: 100
  use_window_filter: false
  window_threshold: 0.10

output:
  run_dir: runs/default
